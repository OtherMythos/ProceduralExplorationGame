<svg width="128" height="128" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">

  <!-- Outer shadow layer -->
  <rect x="27" y="4" width="10" height="56"
        fill="#cfcfcf"
        transform="rotate(45 32 32)"/>
  <rect x="27" y="4" width="10" height="56"
        fill="#cfcfcf"
        transform="rotate(-45 32 32)"/>

  <!-- Mid layer (2px inset on all sides) -->
  <rect x="28" y="5" width="8" height="54"
        fill="#ffffff"
        transform="rotate(45 32 32)"/>
  <rect x="28" y="5" width="8" height="54"
        fill="#ffffff"
        transform="rotate(-45 32 32)"/>

  <!-- Inner main layer (additional inset) -->
  <rect x="29" y="6" width="6" height="52"
        fill="#f2f2f2"
        transform="rotate(45 32 32)"/>
  <rect x="29" y="6" width="6" height="52"
        fill="#f2f2f2"
        transform="rotate(-45 32 32)"/>

</svg>